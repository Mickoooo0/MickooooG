<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micko Garcia | Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #111827; /* Default Pro Mode Background (Dark) */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background-color 0.5s ease;
        }

        /* --- CREATIVE MODE STYLING --- */
        body.creative-mode {
            background-color: #7dd3fc; /* Magiging Sky Blue ang buong background */
        }

        /* Top Navigation Container base sa sketch mo */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background-color: #1f2937;
            border-bottom: 2px solid #374151;
            transition: background-color 0.5s ease, border-color 0.5s ease;
        }

        /* Pag naka-Creative mode, babaguhin natin nang kaunti ang kulay ng nav para bumagay sa Sky Blue */
        body.creative-mode .navbar {
            background-color: #0284c7;
            border-bottom: 2px solid #0369a1;
        }

        .nav-links {
            display: flex;
            gap: 12px;
        }

        /* Ang mga capsule links/buttons sa drawing mo */
        .nav-item {
            border: 2px solid #bae6fd;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            color: #bae6fd;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            background-color: #bae6fd;
            color: #1e3a8a;
        }

        /* Pag naka-Creative mode, gagawin nating puti ang borders ng buttons para kitang-kita */
        body.creative-mode .nav-item {
            border-color: #ffffff;
            color: #ffffff;
        }

        body.creative-mode .nav-item:hover {
            background-color: #ffffff;
            color: #0284c7;
        }

        /* Ang Hero / Main Space sa gitna */
        .main-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        /* Ang bilugang speech bubble sa sketch mo (Pro Mode Style) */
        .intro-bubble {
            border: 3px solid #bae6fd;
            padding: 40px 60px;
            border-radius: 50px; 
            max-width: 600px;
            font-size: 2.2rem;
            font-weight: bold;
            line-height: 1.4;
            color: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: all 0.5s ease;
        }

        /* --- SAKTONG CONFIGURATION PARA SA SKY BLUE CREATIVE MODE --- */
        body.creative-mode .intro-bubble {
            background-color: #ffffff; /* Puting bubble para lutang sa sky blue background */
            color: #1e3a8a; /* Dark Blue na text para madaling basahin */
            border-color: transparent;
            transform: scale(1.05); /* May kaunting pag-zoom pag nag-slide */
            box-shadow: 0 15px 35px rgba(30, 58, 138, 0.25);
        }

        /* Footer area kung nasaan ang slider */
        .footer-controls {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        /* Ang modernong "Slide to creative mode" switch */
        .switch-container {
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid #bae6fd;
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
            user-select: none;
            transition: all 0.5s ease;
        }

        body.creative-mode .switch-container {
            border-color: #1e3a8a;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #4b5563;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #1e3a8a; /* Madilim na asul na slider kapag naka-on */
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .slider-text {
            font-weight: bold;
            font-size: 0.95rem;
            color: #bae6fd;
            transition: color 0.5s ease;
        }

        /* Gagawin nating dark blue ang font ng slider text para mabasa sa sky blue background */
        body.creative-mode .slider-text {
            color: #1e3a8a;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="#about" class="nav-item">About Me</a>
            <a href="#skills" class="nav-item">Tech Stack and tools</a>
            <a href="#certifications" class="nav-item">Certifications</a>
            <a href="#projects" class="nav-item">Featured Projects</a>
        </div>
        <div>
            <a href="#contact" class="nav-item">Contact Me</a>
        </div>
    </nav>

    <main class="main-hero">
        <div class="intro-bubble" id="greetingBubble">
            Hi I'm Micko Welcome to my Website
        </div>
    </main>

    <footer class="footer-controls">
        <label class="switch-container">
            <div class="switch">
                <input type="checkbox" id="modeToggle">
                <span class="slider"></span>
            </div>
            <span class="slider-text" id="toggleText">Slide to creative mode</span>
        </label>
    </footer>

    <script>
        const modeToggle = document.getElementById('modeToggle');
        const toggleText = document.getElementById('toggleText');
        const greetingBubble = document.getElementById('greetingBubble');

        modeToggle.addEventListener('change', function() {
            if (this.checked) {
                // KAPAG NAKA-ON (CREATIVE MODE)
                document.body.classList.add('creative-mode');
                toggleText.textContent = "Creative Mode Active!";
                greetingBubble.textContent = "HI, I'M MICKO."; /* Ang gusto mong malaking text format kanina */
            } else {
                // KAPAG NAKA-OFF (BACK TO PRO VERSION)
                document.body.classList.remove('creative-mode');
                toggleText.textContent = "Slide to creative mode";
                greetingBubble.textContent = "Hi I'm Micko Welcome to my Website";
            }
        });
    </script>

</body>
</html>
