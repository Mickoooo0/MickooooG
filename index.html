<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micko Garcia | Premium Portfolio</title>
    <style>
        /* --- BASE STYLING (PRO MODE) --- */
        :root {
            --bg-color: #0b0f19;
            --frame-border: #bae6fd;
            --text-main: #ffffff;
            --card-bg: rgba(31, 41, 55, 0.4);
            --border-color: #374151;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Tinanggal ang scroll sa labas ng frame */
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- CREATIVE MODE --- */
        body.creative-mode {
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
        }

        /* --- THE FULL SCREEN MASTER FRAME (ANG DRAWING MO) --- */
        .window-frame {
            width: 100vw;   /* Sakop ang buong lapad ng screen */
            height: 100vh;  /* Sakop ang buong taas ng screen */
            display: grid;
            grid-template-rows: auto 1fr auto;
            border: 4px solid var(--frame-border); /* Bahagyang nilakihan ang linya para solid ang frame */
            box-sizing: border-box; /* Sinisiguradong kasama ang border sa sukat */
            position: relative;
            transition: all 0.5s ease;
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(8px);
        }

        /* Kapag naka-Creative Mode, mag-g-glow ang buong frame */
        body.creative-mode .window-frame {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            box-shadow: inset 0 0 40px rgba(56, 189, 248, 0.1);
        }

        /* --- NAVIGATION BAR (TOP ROW) --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem; /* Nilakihan ang space sa gilid para premium tingnan */
            border-bottom: 2px solid var(--frame-border);
        }

        body.creative-mode .navbar {
            border-bottom-color: rgba(255, 255, 255, 0.1);
        }

        .nav-links { display: flex; gap: 16px; }

        .nav-item {
            border: 2px solid var(--frame-border);
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--frame-border);
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .nav-item:hover, .nav-item.active {
            background-color: var(--frame-border);
            color: #0b0f19;
        }

        body.creative-mode .nav-item {
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }
        body.creative-mode .nav-item:hover {
            background-color: #ffffff;
            color: #020617;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* --- MAIN VIEWPORT INTERIOR (MIDDLE ROW) --- */
        .main-viewport {
            padding: 3rem 2rem;
            overflow-y: auto; /* Dito sa loob lang mag-e-scroll ang mga cards mo */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3.5rem;
            position: relative;
        }

            z-index: 1;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }
