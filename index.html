<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micko Garcia | Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #111827; /* Dark background para lumutang ang lines */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Navigation Container base sa sketch */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background-color: #1f2937;
            border-bottom: 2px solid #374151;
        }

        .nav-links {
            display: flex;
            gap: 12px;
        }

        /* Ang mga pills/capsule na buttons sa drawing mo */
        .nav-item {
            border: 2px solid #bae6fd;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            color: #bae6fd;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            background-color: #bae6fd;
            color: #1e3a8a;
        }

        /* Ang Hero / Main Space sa gitna */
        .main-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        /* Ang bilugang speech bubble sa sketch */
        .intro-bubble {
            border: 3px solid #bae6fd;
            padding: 40px 60px;
            border-radius: 50px; /* Mas bilugan base sa drawing */
            max-width: 600px;
            font-size: 2.2rem;
            font-weight: bold;
            line-height: 1.4;
            color: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Footer area kung nasaan ang slider */
        .footer-controls {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }

        /* Ang modernong "Slide to creative mode" switch */
        .switch-container {
            display: flex;
            align-items: center;
            gap: 12px;
            border: 2px solid #bae6fd;
            padding: 8px 18px;
            border-radius: 25px;
            cursor: pointer;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #4b5563;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #0284c7;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .slider-text {
            font-weight: bold;
            font-size: 0.95rem;
            color: #bae6fd;
        }
    </style>
</head>
<body>

    <!-- Ang Navbar mula sa itaas ng sketch -->
    <nav class="navbar">
        <div class="nav-links">
            <a href="#about" class="nav-item">About Me</a>
            <a href="#skills" class="nav-item">Tech Stack and tools</a>
            <a href="#certifications" class="nav-item">Certifications</a>
            <a href="#projects" class="nav-item">Featured Projects</a>
        </div>
        <div>
            <a href="#contact" class="nav-item">Contact Me</a>
        </div>
    </nav>

    <!-- Ang Gitnang Bahagi kung nasaan ang Bubble Text -->
    <main class="main-hero">
        <div class="intro-bubble">
            Hi I'm Micko Welcome to my Website
        </div>
    </main>

    <!-- Ang Slider Switch sa ibaba ng iyong drawing -->
    <footer class="footer-controls">
        <label class="switch-container">
            <div class="switch">
                <input type="checkbox" id="modeToggle">
                <span class="slider"></span>
            </div>
            <span class="slider-text">Slide to creative mode</span>
        </label>
    </footer>

</body>
</html>
