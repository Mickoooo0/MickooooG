<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micko Garcia | Portfolio</title>
    <style>
        /* --- DESIGN CORE VARIABLES --- */
        :root {
            --bg-color: #020617;
            --bg-gradient: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            --text-main: #ffffff;
            --nav-item-border: rgba(255, 255, 255, 0.3);
            --nav-item-text: #ffffff;
            --bubble-bg: rgba(255, 255, 255, 0.03);
            --bubble-border: rgba(255, 255, 255, 0.2);
            --bubble-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            --card-border: rgba(255, 255, 255, 0.15);
            --bar-color: transparent; 
            --frame-bg: transparent; 
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- THE OUTER LAYOUT ENGINE --- */
        .window-frame {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
            box-sizing: border-box;
            position: relative;
            background: var(--frame-bg);
        }

        .window-frame::before, .window-frame::after {
            content: none !important;
        }

        /* --- NAVIGATION BAR --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            border-bottom: 1px solid var(--bar-color);
            z-index: 20; 
            background: transparent;
        }

        .nav-links { display: flex; gap: 16px; }

        .nav-item {
            border: 2px solid var(--nav-item-border);
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            color: var(--nav-item-text);
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .nav-item:hover {
            background-color: var(--nav-item-text);
            color: #020617;
        }

        /* --- MAIN SCROLLABLE CONTENT VIEWPORT --- */
        .main-viewport {
            padding: 4rem 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem;
            position: relative;
            z-index: 5;
        }

        /* Background Glow Orbs */
        .creative-orb {
            position: absolute;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(56,189,248,0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(50px);
            z-index: 1;
            pointer-events: none;
            animation: float 8s infinite alternate ease-in-out;
        }
        .orb-1 { top: 5%; left: 15%; }
        .orb-2 { bottom: 5%; right: 15%; background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, rgba(0,0,0,0) 70%); }

        /* Speech Greeting Bubble */
        .intro-bubble {
            z-index: 10;
            background: var(--bubble-bg);
            border: 3px solid var(--bubble-border);
            backdrop-filter: blur(25px);
            padding: 45px 65px;
            border-radius: 50px; 
            width: 100%;
            max-width: 700px;
            font-size: 3rem;
            font-weight: 800;
            text-align: center;
            box-sizing: border-box;
            box-shadow: var(--bubble-shadow);
        }

        /* --- PORTFOLIO CARDS WITH VIDEO BACKGROUND ENGINE --- */
        .content-card {
            position: relative; 
            overflow: hidden;   
            z-index: 10;
            width: 100%;
            max-width: 700px;
            /* FALLBACK BACKGROUND: Kulay ng card kung sakaling hindi mag-load o magka-error ang video ninyo */
            background: rgba(30, 41, 59, 0.45) !important; 
            border: 1px solid var(--card-border);
            border-radius: 35px;
            box-sizing: border-box;
            transition: border-color 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease;
        }

        .content-card:hover {
            border-color: rgba(56, 189, 248, 0.5);
            transform: scale(1.01);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* Ang Video Element sa loob ng Card */
        .card-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1; 
            pointer-events: none;
            display: block;
        }
